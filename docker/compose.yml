services:
  postgres:
    build:
      context: ..
      dockerfile: docker/postgres/Dockerfile
    container_name: studio-one-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_local}
    ports:
      - "5432:5432"
    volumes:
      # Postgres 18+ recommended mount point (stores data under /var/lib/postgresql/<major>/data).
      - studio_one_postgres_pgdata:/var/lib/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  studio_one_postgres_pgdata:
