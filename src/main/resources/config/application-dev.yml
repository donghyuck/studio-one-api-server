logging:
  level:
    root: error
    jdk: error
    studio.one: error
    studio.server: error
    org: info
    org.springframework.boot.context.properties: DEBUG
    org.springframework.boot.context.properties.bind: DEBUG
    #org.springframework.boot.autoconfigure: DEBUG
    org.springframework.security: TRACE
    org.springframework.security.authentication: TRACE
    org.springframework.security.authentication.dao: TRACE
    org.springframework.security.web: TRACE
    org.springframework.security.web.FilterChainProxy: TRACE
    org.hibernate: ERROR
    dev.langchain4j: DEBUG
    com.zaxxer.hikari: ERROR
    log4jdbc.log4j2: DEBUG
    #org.springframework.security.access.intercept.aopalliance.MethodSecurityInterceptor: DEBUG
    #org.springframework.security.access.expression.method: DEBUG
spring:
  application:
    name: studio-api
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    sql-migration-prefix: V
    repeatable-sql-migration-prefix: R
    sql-migration-separator: __
    sql-migration-suffixes: .sql
    locations:
      - classpath:/schema/data/postgres
      - classpath:/schema/objecttype/postgres
      - classpath:/schema/user/postgres
      - classpath:/schema/security/postgres
      - classpath:/schema/security-acl/postgres
      - classpath:/schema/workspace/postgres
      - classpath:/schema/ai/postgres
      - classpath:/schema/skillgraph/postgres
      - classpath:/schema/avatar/postgres
      - classpath:/schema/attachment/postgres
      - classpath:/schema/template/postgres
      - classpath:/schema/mail/postgres
    out-of-order: true
  ### JPA Config ###
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        default_schema: studioapi
        format_sql: true
        jdbc:
          time_zone: UTC
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  ### DATASOURCE Config ###
  datasource:
    primary:
      url: jdbc:log4jdbc:postgresql://localhost:5432/studio_db
      driver-class-name: net.sf.log4jdbc.sql.jdbcapi.DriverSpy
      username: studioapi
      password: studioapi
      type: com.zaxxer.hikari.HikariDataSource
      hikari:
        minimum-idle: 5 # 최소 유휴 커넥션 수
        maximum-pool-size: 5 # 커넥션 풀 최대 크기 (일반 웹서비스 기준)
        idle-timeout: 600000 # 커넥션 유휴 종료 시간 (10분, 단위: ms)
        max-lifetime: 1800000 # 커넥션 최대 수명 (30분, 단위: ms)
        connection-timeout: 30000 # 커넥션 획득 timeout (30초)
        pool-name: PrimaryHikariCP # 풀 이름 지정
        auto-commit: false # 자동 커밋 여부
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.debug: true
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  servlet:
    multipart:
      max-file-size: 50MB # 업로드 1개 파일 최대 크기
      max-request-size: 200MB # 요청 전체(여러 파일 합) 최대 크기
      file-size-threshold: 0 # 0이면 디스크로 바로 저장(메모리에 안 쌓음)
  ai:
    google:
      genai:
        chat:
          api-key: ${GEMINI_API_KEY:}
          options:
            model: gemini-2.5-flash
        embedding:
          api-key: ${GEMINI_API_KEY:}
          text:
            options:
              model: gemini-embedding-001
              dimensions: 768
app:
  status-page:
    background-image-url: ${SERVICE_STATUS_BG_URL:}
    free-background:
      enabled: ${SERVICE_STATUS_FREE_BG_ENABLED:true}
      image-url: ${SERVICE_STATUS_FREE_BG_IMAGE_URL:https://picsum.photos/1920/1080}
      probe-timeout-ms: ${SERVICE_STATUS_FREE_BG_PROBE_TIMEOUT_MS:1500}
      cache-ttl-seconds: ${SERVICE_STATUS_FREE_BG_CACHE_TTL_SECONDS:300}
management:
  endpoints:
    web:
      exposure:
        include: mappings # 또는 "*"
studio:
  banner-mode: off
  env:
    log:
      enabled: false
      print-values: false
  i18n:
    # resources:   # ← 비워두면 자동 스캔
    #   - classpath:i18n/*/messages
    #   - classpath:META-INF/i18n/user/messages
    encoding: UTF-8
    cache-seconds: -1
    use-code-as-default-message: true
    fallback-to-system-locale: false
  persistence:
    type: jpa
  features:
    application-properties:
      enabled: true
    ai:
      enabled: true
    attachment:
      enabled: true
      web:
        enabled: true
        mgmt-base-path: /api/mgmt/files
    avatar-image:
      enabled: true
      web:
        user-base: /api/mgmt/users
        public-base: /api/profile
      replica:
        base-dir: var/lib/app/avatars
        ensure-dirs: true
        cleanup:
          enabled: true
          cron: 0 0 3 * * *
          ttlDays: 30
    document:
      enabled: true
      web:
        enabled: true
        base-path: /api/mgmt/documents
    forums:
      enabled: true
      admin-role: ROLE_ADMIN,ADMIN
      attachments:
        object-type: 1
      cache:
        enabled: true
        list-ttl: 60s
        detail-ttl: 5m
        list-max-size: 10000
        detail-max-size: 50000
        record-stats: true
      web:
        enabled: true
        base-path: /api/forums
        mgmt-base-path: /api/mgmt/forums
    jasypt:
      enabled: false
      encryptor:
        bean: components:foundation:jasypt-string-encryptor
        password: ${JASYPT_ENCRYPTOR_PASSWORD} # 환경 변수로 암호화 비밀번호 설정
        algorithm: "PBEWithSHA256And128BitAES-CBC-BC" # Bouncy Castle 알고리즘 사용
        providerName: "BC" # Bouncy Castle 프로바이더 지정
        key-obtention-iterations: 1000
        pool-size: 1
        salt-generator-classname: "org.jasypt.salt.RandomSaltGenerator"
        string-output-type: "base64"
      http:
        enabled: true # 웹 엔드포인트 사용 시 true
        base-path: /internal/jasypt
        require-token: true
        #token-env: JASYPT_HTTP_TOKEN
        token-value: local-dev-token
    mail:
      enabled: true
      web:
        enabled: true
        base-path: /api/mgmt/mail
        notify: stomp
        stomp-destination: /mail-sync
    realtime:
      enabled: true
    template:
      enabled: true
    workspace:
      enabled: true
      company-required: true
      company-scope-enforced: true
      web:
        enabled: true
        public-base-path: /api/workspaces
        mgmt-base-path: /api/mgmt/workspaces
    textract:
      enabled: true
    thumbnail:
      enabled: true
    user:
      enabled: true
      web:
        enabled: true
    objecttype:
      enabled: true
      mode: db
      web:
        enabled: true
        base-path: /api/object-types
        mgmt-base-path: /api/mgmt/object-types
    skillgraph:
      enabled: true
      web:
        enabled: true
  attachment:
    storage:
      base-dir: var/lib/app/files
    download-url:
      public-base-url: http://localhost:8080
      signing-secret: ${ATTACHMENT_DOWNLOAD_URL_SIGNING_SECRET}
    thumbnail:
      enabled: true
      base-dir: var/lib/app/files/thumbnails
      ensure-dirs: true
  textract:
    max-extract-size: 50M
    tesseract:
      datapath: /opt/homebrew/share/tessdata
      language: kor+eng
    pdf:
      engine: pymupdf4llm
      fallback-enabled: true
      engines:
        pymupdf4llm:
          enabled: true
          endpoint: http://localhost:8000/extract/pdf
          timeout: 60s
          max-file-size: 50MB
  thumbnail:
    default-size: 128
    default-format: png
    min-size: 16
    max-size: 512
    max-source-size: 50M
    max-source-pixels: 25000000
    renderers:
      image:
        enabled: true
      pdf:
        enabled: true
        page: 0
      pptx:
        enabled: true
        slide: 0
      docx:
        enabled: true
      hwp:
        enabled: true
      hwpx:
        enabled: true
  mail:
    imap:
      host: ${MAIL_HOST:localhost}
      port: 993
      username: ${MAIL_USER:}
      password: ${MAIL_PASSWORD:}
      protocol: imaps # 기본 imaps
      folder: helpdesk #INBOX
      max-messages: 500
      concurrency: 4 # 동시 처리 스레드 수
      max-attachment-bytes: 10485760 # 10MB 초과 첨부는 저장하지 않음
      max-body-bytes: 1048576 # 본문은 길이 제한으로 자름
  objecttype:
    mode: db # yaml | db
    registry:
      cache:
        enabled: true
        ttl-seconds: 300
        max-size: 1000
    policy:
      cache:
        enabled: true
        ttl-seconds: 300
        max-size: 1000
  skillgraph:
    persistence: jdbc
  chunking:
    enabled: true
    strategy: recursive
    max-size: 800
    overlap: 100
  ai:
    routing:
      default-chat-provider: google-ai-gemini
      default-embedding-provider: google-ai-gemini
    prompts:
      query-rewrite: "classpath:prompts/query-rewrite.v1.prompt"
      summarization: "classpath:prompts/summarization.v1.prompt"
      keyword-extraction: "classpath:prompts/keyword-extraction.v1.prompt"
      rag-cleaner: "classpath:prompts/rag-cleaner.v1.prompt"
    rag:
      jobs:
        repository: jdbc
      cache:
        maximum-size: 1000
        ttl: 10m
      retry:
        max-attempts: 3
        wait-duration: 2s
      retrieval:
        vector-weight: 0.7
        lexical-weight: 0.3
        min-relevance-score: 0.15
        keyword-fallback-enabled: true
        semantic-fallback-enabled: true
        query-expansion:
          enabled: true
          max-keywords: 5
      object-scope:
        default-list-limit: 20
        max-list-limit: 100
      cleaner:
        enabled: false
        prompt: rag-cleaner
        max-input-chars: 20000
        fail-open: true
      diagnostics:
        enabled: true
        log-results: true
        max-snippet-chars: 160
      keywords:
        scope: document
        max-input-chars: 4000
      default-embedding-profile: gemini-768
      embedding-profiles:
        gemini-768:
          provider: google-ai-gemini
          model: gemini-embedding-001
          dimension: 768
          supported-input-types: [TEXT, TABLE_TEXT, IMAGE_CAPTION, OCR_TEXT]
    endpoints:
      enabled: true
      chat:
        memory:
          enabled: true
          max-messages: 20
          max-conversations: 1000
          ttl: 30m
    providers:
      google-ai-gemini:
        enabled: true
        type: GOOGLE_AI_GEMINI
        chat:
          enabled: true
        embedding:
          enabled: true
        google-embedding:
          task-type: RETRIEVAL_DOCUMENT
  cloud:
    storage:
      web:
        enabled: true
        endpoint: /api/mgmt/objectstorage
      providers:
        naver_cufit:
          type: s3
          enabled: true
          region: kr-standard
          endpoint: https://kr.object.ncloudstorage.com
          credentials:
            access-key: ${S3_ACCESS_KEY}
            secret-key: ${S3_SECRET_KEY}
          s3:
            path-style: true
            presigner-enabled: true
  realtime:
    stomp:
      enabled: true
      endpoint: /ws
      app-destination-prefix: /app
      topic-prefix: /topic
      user-prefix: /user
      allowed-origins: # CORS 허용 오리진
        - "http://localhost:3000"
        - "http://192.168.0.156:3000"
      sock-js: false # SockJS fallback 사용 여부
      jwt-enabled: false # JwtDecoder 사용 시 true
      redis-enabled: false # Redis Pub/Sub 사용 시 true
      redis-channel: studio:realtime:events
  security:
    enabled: true
    acl:
      enabled: true
      cache-name: aclCache
      admin-role: ROLE_ADMIN
      metrics-enabled: true
      audit-enabled: true
      defaults:
        enabled: true
        policies:
          - domain: features
            component: skillgraph
            roles:
              - role: ROLE_ADMIN
                actions: [READ, WRITE, ADMIN]
              - role: ROLE_DEVELOPER
                actions: [READ]
      sync:
        enabled: true
      web:
        enabled: true
        base-path: /api/mgmt/acl
    auth:
      lock:
        enabled: true
        maxAttempts: 5
        lockDuration: 5m
      password-reset:
        enabled: true
        reset-password-url: /password-reset
        web:
          enabled: true
          base-path: /api/auth/password-reset
    audit:
      login-failure:
        enabled: true
        web:
          enabled: true
    password-encoder:
      algorithm: BCRYPT
      bcrypt-strength: 10
    form-login:
      enabled: false
      login-page: /login
      login-processing-url: /login
      username-parameter: username
      password-parameter: password
      default-success-url: /
    logout:
      enabled: false
      logout-url: /logout
      logout-success-url: /login?logout
      invalidate-session: true
      delete-cookies: ["JSESSIONID"]
    jwt:
      enabled: true
      secret: rPdiCjP07o9Soenln4t58AZr5bgaTLpXllDbbRs6yZ0=
      access-ttl: 30m
      refresh-ttl: 35m
      issuer: www.cufit.go.kr
      header: Authorization
      prefix: Bearer
      claim-authorities: authorities
      endpoints:
        login-enabled: true
        refresh-enabled: true
        base-path: /api/auth
      permit:
        - /api/auth/**
      fail-if-missing: true
    cors:
      allowed-origins:
        - "http://localhost:3000"
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
      allowed-headers:
        - Authorization
        - Content-Type
        - If-Match
      exposed-headers:
        - Authorization
        - ETag
      allow-credentials: true
      max-age: 3600
    permit:
      permit-all:
        - /
        - /index.html
        - /service-status-config.js
        - /api/auth/**
        - /api/users/*
        - /api/profile/*/avatar*
        - /api/attachments/signed-download
        - /api/forums/**
        - /api/forums/*/topics/*/posts/*/attachments*
        - /actuator/**
        - /ws/**
        - /error
